<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Cloud Chat — Simple Login (Supabase)</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { opacity: 0.9; }
        button.secondary { background: #dc3545; }
        
        .post { background: #fff; border: 1px solid #eaeaea; padding: 15px; margin-top: 15px; border-radius: 8px; width: 100%; max-width: 500px; position: relative; }
        .time { font-size: 11px; color: #999; float: right; }
        .hidden { display: none; }
        .user-info { font-size: 14px; margin-bottom: 10px; color: #555; display: flex; justify-content: space-between; align-items: center; }
        .logout-btn { width: auto; padding: 5px 10px; font-size: 12px; margin: 0; }
        .author { color: #007bff; font-weight: bold; }
        
        /* Стили для монитора статусов */
        .status-monitor {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .status-monitor h3 {
            margin-top: 0;
            color: #333;
            font-size: 16px;
            border-bottom: 2px solid #007bff;
            padding-bottom: 10px;
        }
        .online-users {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }
        .online-user {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .online-dot {
            width: 8px;
            height: 8px;
            background: #4caf50;
            border-radius: 50%;
            display: inline-block;
        }
        .user-count {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        .no-users {
            color: #999;
            font-style: italic;
            padding: 10px 0;
        }
    </style>
</head>
<body>

    <div id="auth-section" class="container">
        <h3>Добро пожаловать в чат</h3>
        <p style="font-size: 13px; color: #666;">Введите данные, чтобы начать общение</p>
        <input type="text" id="auth-nick" placeholder="Ваш Никнейм (обязательно)">
        <input type="email" id="auth-email" placeholder="Ваш Email (опционально)">
        <button id="loginBtn">Войти в чат</button>
    </div>

    <div id="chat-section" class="hidden">
        <div class="status-monitor">
            <h3>📊 Монитор статусов</h3>
            <div class="user-count">
                Онлайн пользователей: <strong id="online-count">0</strong>
            </div>
            <div class="online-users" id="online-users-list">
                <div class="no-users">Нет пользователей онлайн</div>
            </div>
        </div>

        <div class="container">
            <div class="user-info">
                <span>Вы вошли как: <b id="current-user-display"></b></span>
                <button id="logoutBtn" class="secondary logout-btn">Выйти</button>
            </div>
            <hr>
            <input type="text" id="msg-text" placeholder="Напишите что-нибудь...">
            <button id="sendBtn">Отправить сообщение</button>
        </div>

        <div id="feed" style="width: 100%; max-width: 500px;"></div>
    </div>

    <script type="module">
        // Импортируем Supabase JS Client через ESM CDN
        import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

        // ВАШИ КЛЮЧИ SUPABASE
        const SUPABASE_URL = "https://YOUR_PROJECT_ID.supabase.co"; 
        const SUPABASE_ANON_KEY = "YOUR_ANON_KEY";

        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- УПРАВЛЕНИЕ СТАТУСАМИ ОНЛАЙН ---
        let currentUserId = null;
        let heartbeatInterval = null;
        let messagesChannel = null;
        let onlineChannel = null;

        // Функция установки статуса онлайн
        async function setUserOnline(nickname, email) {
            try {
                currentUserId = nickname.toLowerCase().replace(/[^a-zA-Z0-9]/g, '_');
                
                await supabase.from('online_users').upsert({
                    id: currentUserId,
                    nickname: nickname,
                    email: email,
                    last_seen: new Date().toISOString(),
                    status: 'online'
                });
                
                // Запускаем heartbeat для поддержания статуса онлайн
                startHeartbeat(nickname, email);
            } catch (e) {
                console.error("Ошибка установки статуса онлайн:", e);
            }
        }

        // Heartbeat для обновления временной метки каждые 30 секунд
        function startHeartbeat(nickname, email) {
            if (heartbeatInterval) clearInterval(heartbeatInterval);
            
            heartbeatInterval = setInterval(async () => {
                try {
                    if (!currentUserId) return;
                    await supabase.from('online_users').upsert({
                        id: currentUserId,
                        nickname: nickname,
                        email: email,
                        last_seen: new Date().toISOString(),
                        status: 'online'
                    });
                } catch (e) {
                    console.error("Ошибка heartbeat:", e);
                }
            }, 30000);
        }

        // Функция выхода из системы
        async function setUserOffline() {
            if (currentUserId) {
                try {
                    await supabase.from('online_users').delete().eq('id', currentUserId);
                } catch (e) {
                    console.error("Ошибка удаления статуса онлайн:", e);
                }
            }
            if (heartbeatInterval) {
                clearInterval(heartbeatInterval);
                heartbeatInterval = null;
            }
            currentUserId = null;
            
            // Отписываемся от каналов при выходе
            if (messagesChannel) supabase.removeChannel(messagesChannel);
            if (onlineChannel) supabase.removeChannel(onlineChannel);
        }

        // Получение и рендер списка активных юзеров
        async function fetchAndRenderOnlineUsers() {
            const { data: users, error } = await supabase
                .from('online_users')
                .select('*')
                .eq('status', 'online');

            if (error) {
                console.error("Ошибка получения пользователей:", error);
                return;
            }

            const usersList = document.getElementById('online-users-list');
            const onlineCount = document.getElementById('online-count');
            const currentNick = localStorage.getItem('chat_nick');
            
            const now = new Date();
            // Фильтруем записи старше 1 минуты на стороне клиента
            const activeUsers = users.filter(user => {
                if (!user.last_seen) return false;
                const lastSeenDate = new Date(user.last_seen);
                const diffSeconds = (now - lastSeenDate) / 1000;
                return diffSeconds < 60; 
            });

            onlineCount.textContent = activeUsers.length;

            if (activeUsers.length === 0) {
                usersList.innerHTML = '<div class="no-users">Нет пользователей онлайн</div>';
            } else {
                usersList.innerHTML = activeUsers.map(user => `
                    <div class="online-user">
                        <span class="online-dot"></span>
                        ${user.nickname}${user.nickname === currentNick ? ' (вы)' : ''}
                    </div>
                `).join('');
            }
        }

        // Мониторинг онлайн пользователей в реальном времени
        function monitorOnlineUsers() {
            fetchAndRenderOnlineUsers();

            if (onlineChannel) supabase.removeChannel(onlineChannel);

            onlineChannel = supabase
                .channel('public:online_users')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'online_users' }, () => {
                    fetchAndRenderOnlineUsers();
                })
                .subscribe();
        }

        // Обработка закрытия/ухода со страницы
        window.addEventListener('beforeunload', () => { setUserOffline(); });
        window.addEventListener('pagehide', () => { setUserOffline(); });

        // --- УПРАВЛЕНИЕ ИНТЕРФЕЙСОМ И ВХОДОМ ---
        const authSec = document.getElementById('auth-section');
        const chatSec = document.getElementById('chat-section');
        const nickDisplay = document.getElementById('current-user-display');

        async function checkLogin() {
            const savedNick = localStorage.getItem('chat_nick');
            if (savedNick) {
                authSec.classList.add('hidden');
                chatSec.classList.remove('hidden');
                nickDisplay.innerText = savedNick;
                
                const savedEmail = localStorage.getItem('chat_email');
                await setUserOnline(savedNick, savedEmail);
                monitorOnlineUsers();
                loadMessages();
            } else {
                authSec.classList.remove('hidden');
                chatSec.classList.add('hidden');
                await setUserOffline();
            }
        }

        // Кнопка входа
        document.getElementById('loginBtn').onclick = async () => {
            const nick = document.getElementById('auth-nick').value.trim();
            const email = document.getElementById('auth-email').value.trim();
            
            if (!nick) {
                alert("Пожалуйста, введите Никнейм!");
                return;
            }

            localStorage.setItem('chat_nick', nick);
            localStorage.setItem('chat_email', email);
            await checkLogin();
        };

        // Кнопка выхода
        document.getElementById('logoutBtn').onclick = async () => {
            await setUserOffline();
            localStorage.removeItem('chat_nick');
            localStorage.removeItem('chat_email');
            checkLogin();
        };

        // Запускаем проверку при старте
        checkLogin();

        // --- ЛОГИКА ЧАТА ---

        // Отправка сообщения
        document.getElementById('sendBtn').onclick = async () => {
            const text = document.getElementById('msg-text').value.trim();
            if(!text) return;

            const currentNick = localStorage.getItem('chat_nick');
            const currentEmail = localStorage.getItem('chat_email');

            const { error } = await supabase.from('chat_messages').insert([
                { nickname: currentNick, email: currentEmail, text: text }
            ]);

            if (error) {
                alert("Ошибка при отправке: " + error.message);
            } else {
                document.getElementById('msg-text').value = "";
            }
        };

        // Первоначальный рендер сообщений
        async function fetchAndRenderMessages() {
            const { data: messages, error } = await supabase
                .from('chat_messages')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error("Ошибка загрузки сообщений:", error);
                return;
            }

            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            
            messages.forEach((data) => {
                const time = data.created_at 
                    ? new Date(data.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) 
                    : '...';
                
                feed.innerHTML += `
                    <div class="post">
                        <span class="time">${time}</span>
                        <span class="author">${data.nickname}</span>
                        <p style="margin-top: 8px;">${data.text}</p>
                    </div>
                `;
            });
        }

        // Чтение сообщений и подписка в реальном времени
        function loadMessages() {
            fetchAndRenderMessages();

            if (messagesChannel) supabase.removeChannel(messagesChannel);

            messagesChannel = supabase
                .channel('public:chat_messages')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat_messages' }, () => {
                    fetchAndRenderMessages();
                })
                .subscribe();
        }
    </script>
</body>
</html>
