<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Облачная практика — Live Terminal</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; line-height: 1.6; }
        .post { border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
        .likes { color: #e74c3c; font-weight: bold; }
        button { cursor: pointer; background: #3498db; color: white; border: none; padding: 5px 10px; border-radius: 3px; }
    </style>
</head>
<body>

    <h1>Проект успешно запущен в облаке!</h1>
    <hr>
    <p>Работу выполнил студент: <strong>Abdi</strong></p>
    <p>Группа: <strong>ПО-242</strong></p>
    <p>Тип облака: <strong>PaaS (GitHub Pages)</strong></p>

    <div id="terminal">
        <h3>Лента сообщений (Live)</h3>
        <div id="feed">Загрузка сообщений...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { 
            getFirestore, 
            collection, 
            query, 
            orderBy, 
            onSnapshot, 
            updateDoc, 
            doc, 
            increment 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Конфигурация вашего Firebase проекта
        const firebaseConfig = {
            apiKey: "ВАШ_API_KEY",
            authDomain: "ВАШ_PROJECT.firebaseapp.com",
            projectId: "ВАШ_PROJECT_ID",
            storageBucket: "ВАШ_PROJECT.appspot.com",
            messagingSenderId: "ID",
            appId: "APP_ID"
        };

        // Инициализация
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const postsRef = collection(db, "posts");

        // 1. Реализация сортировки orderBy("timestamp", "desc")
        const q = query(postsRef, orderBy("timestamp", "desc"));

        // 2. Архитектура onSnapshot для "живого" терминала
        onSnapshot(q, (snapshot) => {
            const feedElement = document.getElementById('feed');
            feedElement.innerHTML = ''; // Очистка перед обновлением

            snapshot.forEach((postDoc) => {
                const data = postDoc.data();
                const postItem = document.createElement('div');
                postItem.className = 'post';
                
                postItem.innerHTML = `
                    <p>${data.text}</p>
                    <span class="likes">❤️ ${data.likes || 0}</span>
                    <button onclick="addLike('${postDoc.id}')">Лайк</button>
                `;
                feedElement.appendChild(postItem);
            });
        });

        // 3. Подключение updateDoc и increment для работы с лайками
        window.addLike = async (id) => {
            const docRef = doc(db, "posts", id);
            try {
                await updateDoc(docRef, {
                    likes: increment(1)
                });
            } catch (e) {
                console.error("Ошибка при обновлении лайков: ", e);
            }
        };
    </script>
</body>
</html>
