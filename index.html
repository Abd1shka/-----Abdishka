<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монитор статусов</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4 space-y-6">

    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 w-full max-w-xl">
        <h2 class="text-xl font-bold text-gray-900 mb-2">Мой профиль</h2>
        <p class="text-gray-600 mb-4">Вы зашли как: <span id="current-user" class="font-semibold text-gray-800">Загрузка...</span></p>
        
        <div class="grid grid-cols-2 gap-3">
            <button onclick="changeStatus('📚 Учусь', '#1e9242')" 
                    class="bg-[#1e9242] hover:opacity-90 text-white font-medium py-3 px-4 rounded-xl shadow-sm border border-black/10 cursor-pointer transition">
                 📚 Учусь
            </button>
            <button onclick="changeStatus('☕ Кофе-брейк', '#ffcc00')" 
                    class="bg-[#ffcc00] hover:opacity-90 text-black font-medium py-3 px-4 rounded-xl shadow-sm border border-black/10 cursor-pointer transition">
                 ☕ Кофе
            </button>
            <button onclick="changeStatus('🎮 В игре', '#179cb3')" 
                    class="bg-[#179cb3] hover:opacity-90 text-white font-medium py-3 px-4 rounded-xl shadow-sm border border-black/10 cursor-pointer transition">
                 🎮 В игре
            </button>
            <button onclick="changeStatus('🏠 Дома', '#64748b')" 
                    class="bg-[#64748b] hover:opacity-90 text-white font-medium py-3 px-4 rounded-xl shadow-sm border border-black/10 cursor-pointer transition">
                 🏠 Дома
            </button>
        </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 w-full max-w-xl">
        <h2 class="text-xl font-bold text-gray-900 mb-4">Монитор группы</h2>
        
        <div id="group-container" class="space-y-4">
            <p class="text-gray-400 text-sm">Загрузка пользователей...</p>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm' [cite: 27, 28]

        // Ваши личные данные подключения сохранены:
        const URL = 'https://pkllhpwpyznbmirhwzec.supabase.co';
        const KEY = 'sb_publishable_jh6KIEbCx9RI3QwrVU_EDQ_-ezVsgzC'; 
        const supabase = createClient(URL, KEY); [cite: 27, 28]

        // Ваш персональный ID из таблицы Roman сохранен:
        const MY_ID = '9a32646f-c9f4-49a6-8cca-98de1edf1d3d'; 

        // Функция изменения статуса
        window.changeStatus = async (text, color) => {
            const { error } = await supabase
                .from('Roman') // Имя вашей таблицы
                .update({ status: text, color: color })
                .eq('id', MY_ID);

            if (error) {
                alert("Ошибка! Проверьте RLS политики в Supabase."); [cite: 27, 28]
                console.error(error); [cite: 27, 28]
            } else {
                fetchGroup(); 
            }
        };

        // Функция получения данных всех участников
        async function fetchGroup() {
            const { data, error } = await supabase
                .from('Roman') // Имя вашей таблицы
                .select('*')
                .order('username', { ascending: true }); [cite: 27, 28]

            if (error) {
                console.error("Ошибка получения данных:", error);
                document.getElementById('group-container').innerHTML = '<p class="text-red-500 text-sm">Ошибка загрузки. Проверьте RLS.</p>';
                return;
            }

            const container = document.getElementById('group-container');
            container.innerHTML = ''; 

            let meFound = false;

            data.forEach(profile => {
                if (profile.id === MY_ID) {
                    document.getElementById('current-user').innerText = profile.username || "Без имени";
                    meFound = true;
                }

                const userRow = document.createElement('div');
                userRow.className = "flex items-start space-x-3 pt-2 pb-2 border-b border-gray-100 last:border-0";
                
                // ИСПРАВЛЕНО: Добавлены косые кавычки (``) для оформления строкового шаблона HTML
                userRow.innerHTML = `
                    <span class="w-2.5 h-2.5 rounded-full mt-1.5 shrink-0" style="background-color: ${profile.color || '#ccc'}"></span>
                    <div>
                        <div class="font-bold text-gray-950 text-base leading-tight">${profile.username || "Без имени"}</div>
                        <div class="text-sm text-gray-500 mt-0.5">${profile.status || 'Нет статуса'}</div>
                    </div>
                `;
                container.appendChild(userRow);
            });

            // Если ваш UUID не найден в базе, выводим предупреждение вместо бесконечной "Загрузки..."
            if (!meFound) {
                document.getElementById('current-user').innerHTML = '<span class="text-red-500">Пользователь с вашим ID не найден в таблице Roman!</span>';
            }
        }

        // Запуск при старте страницы
        fetchGroup();

        // Автоматическое обновление данных каждые 5 секунд для синхронизации в реальном времени [cite: 2]
        setInterval(fetchGroup, 5000); [cite: 27, 28]
    </script>
</body>
</html>
